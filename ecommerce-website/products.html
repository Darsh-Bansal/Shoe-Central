<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shoe Central - Products</title>
<link rel="stylesheet" href="assets/css/products.css" />
<link rel="stylesheet" href="assets/css/script.css" />
</head>
<body>
<header>
<div class="logo"><img src="assets/images/logo.png" style="width:7rem"></div>
<nav>
<a href="home.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart <span id="cart-count">0</span></a>
<a href="login.html">Login</a>
</nav>
</header>


<section class="products">
<h2 style="color:white">Our Collection</h2>
<div class="search-box">
<input type="text" id="product-search" placeholder="Search products..." onkeyup="filterProducts(this.value)">
</div>
<div class="grid">
<div class="card">
<img src="assets/images/running.jpg" />
<h3>Running Shoes</h3>
<p>₹ 590</p>
<button onclick="addToCart('Running Shoes', 590)">Add to Cart</button>
</div>
<div class="card">
<img src="assets/images/casual.jpg" />
<h3>Casual Shoes</h3>
<p>₹ 990</p>
<button onclick="addToCart('Casual Shoes', 990)">Add to Cart</button>
</div>
<div class="card">
<img src="assets/images/sneaker.jpg" />
<h3>Sneakers</h3>
<p>₹ 4990</p>
<button onclick="addToCart('Sneakers', 4990)">Add to Cart</button>
</div>
</div>
</section>


<footer>
<p>© 2025 Shoe Central. All rights reserved.</p>
</footer>
<script src="assets/js/script.js"></script>
</body>
</html>
